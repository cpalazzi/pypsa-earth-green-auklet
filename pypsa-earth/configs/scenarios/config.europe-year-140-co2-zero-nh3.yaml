# Europe 140-node full-year run with zero CO2 cap and ammonia optionality.
# Builds on H2 optionality (electrolysis, H2 storage) and adds:
#   - NH3 synthesis (Haber-Bosch: H2 + electricity → NH3, with min-load & ramp constraints)
#   - NH3 storage (cheap long-duration liquid storage)
#   - CCGT NH3 (ammonia-to-power, same costs as CCGT H2)
#   - NH3 pipeline (liquid ammonia transport between nodes)
# Note: CCGT H2 is also included so the optimizer can choose H2-direct or NH3 pathways.

version: 0.8.0
tutorial: false

logging:
  level: INFO
  format: "%(levelname)s:%(name)s:%(message)s"

results_dir: results/
summary_dir: results/

foresight: overnight

countries:
  - DE
  - FR
  - GB
  - IT
  - ES
  - PL
  - NL
  - BE
  - CZ
  - RO
  - SE
  - PT
  - GR
  - HU
  - AT
  - BG
  - DK
  - FI
  - SK
  - IE
  - HR
  - LT
  - SI
  - LV
  - EE
  - CY
  - LU
  - MT
  - "NO"
  - CH
  - RS
  - BA
  - AL
  - MK
  - ME

enable:
  retrieve_databundle: false
  retrieve_databundle_sector: false
  retrieve_cost_data: false
  download_osm_data: true
  download_global_buildings: false
  build_natura_raster: false
  build_cutout: false
  progress_bar: true
  custom_busmap: false

custom_rules: []

run:
  name: "europe-year-140"
  sector_name: ""
  shared_cutouts: true
  allow_scenario_failure: false

scenario:
  simpl: [""]
  ll: ["copt"]
  clusters: [140]
  opts: [Co2zero-3h-NH3]
  planning_horizons:
  - 2030
  sopts:
  - "8760h"
  demand:
  - "AB"

snapshots:
  start: "2013-01-01"
  end: "2014-01-01"
  inclusive: "left"

co2_budget:
  enable: false
  override_co2opt: true
  co2base_value: co2limit

electricity:
  co2limit: 1.0e1
  max_hours:
    H2: 4380
    NH3: 4380  # ~6 months of storage at full output (same as H2 baseline)
  extendable_carriers:
    Store: [battery, H2, NH3]
    Link: [CCGT H2, H2 pipeline, CCGT NH3, NH3 pipeline]

atlite:
  nprocesses: 4
  cutouts:
    cutout-2013-era5:
      module: era5
      dx: 0.3
      dy: 0.3
