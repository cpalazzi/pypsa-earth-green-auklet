# NL single-node H2 run (Rotterdam-area proxy via national single-node aggregation).

version: 0.8.0
tutorial: false

logging:
  level: INFO
  format: "%(levelname)s:%(name)s:%(message)s"

results_dir: results/
summary_dir: results/

foresight: overnight

countries:
  - NL

enable:
  retrieve_databundle: true
  retrieve_databundle_sector: false
  retrieve_cost_data: false
  download_osm_data: true
  download_global_buildings: false
  build_natura_raster: false
  build_cutout: false
  progress_bar: true
  custom_busmap: false

custom_rules: []

run:
  name: "nl-1"
  sector_name: ""
  shared_cutouts: true
  allow_scenario_failure: false

scenario:
  simpl: [""]
  ll: ["copt"]
  clusters: [1]
  opts: [Co2zero-3h-H2]
  planning_horizons:
  - 2030
  sopts:
  - "8760h"
  demand:
  - "AB"

snapshots:
  start: "2013-01-01"
  end: "2014-01-01"
  inclusive: "left"

co2_budget:
  enable: false
  override_co2opt: true
  co2base_value: co2limit

electricity:
  co2limit: 1.0e1
  max_hours:
    H2: 4380
  extendable_carriers:
    Generator: []
    StorageUnit: []
    Store: [H2]
    Link: [CCGT H2, H2 pipeline]

atlite:
  nprocesses: 4
  cutouts:
    cutout-2013-era5:
      module: era5
      dx: 0.3
      dy: 0.3
