 # -----------------
 # Links
 # -----------------
  ammonia_synthesis:
    component_type: link
    source_note: DEA 2030 Hydrogen to Ammonia
    overnight_cost_per_mw: 1526000
    tech_cost_per_mw: 763000 # reactor, catalysts, air separation unit, etc.
    build_cost_per_mw: 763000 # installation
    land_use_km2_per_mw: 0.0000001 # Minimal
    lifetime_years: 30
    interest_rate: 0.1
    fixed_om_fraction: 0.03 # DEA
    # Derived from current basic_ammonia_plant/links.csv coefficients:
    # efficiency(bus0->bus1)=6.25 and efficiency2(bus0->bus2)=-7.092
    # Normalised per 1 unit of ammonia output:
    #   power_in = 1/6.25 = 0.16
    #   hydrogen_in = 7.092/6.25 = 1.13472
    carriers_in: {power: 0.16, hydrogen: 1.13472}
    carriers_out: {ammonia: 1.0}
    overall_efficiency: 0.772
  electrolysis:
