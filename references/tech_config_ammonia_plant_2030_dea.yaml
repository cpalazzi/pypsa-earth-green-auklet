  solar:
    component_type: generator
    source_note: DEA 2030 Utility-scale PV
    overnight_cost_per_mw: 380000 # EUR/MW
    tech_cost_per_mw: 160000 # pv modules + inverter from DEA component lines
    build_cost_per_mw: 220000 # installation + grid + soft costs + residual BOP
    land_use_km2_per_mw: 0.01 # Equator baseline for solar density calibration (100 MW/km² at lat=0); run_global applies latitude-adjusted footprint
    lifetime_years: 40
    interest_rate: 0.1
    fixed_om_fraction: 0.02 # Rounded up DEA excluding land rent
  solar_tracking:
